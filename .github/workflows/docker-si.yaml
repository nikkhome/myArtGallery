name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 1. Авторизуемся в Docker Hub с помощью наших Secrets
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    # 2. Настраиваем окружение сборки
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. Собираем и отправляем (push) образ в Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/my-art-gallery:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/my-art-gallery:${{ github.sha }}