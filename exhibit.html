<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экспонат</title>
    <script src="data.js"></script>
    <style>
        /* Все стили остаются точно такими же, как в предыдущем ответе */
        body {
            margin: 0; background-color: #050505; color: #ffffff;
            font-family: 'Courier New', Courier, monospace; padding-bottom: 100px;
            overflow-x: hidden; cursor: none;
        }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { opacity: 0; animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        .delay-1 { animation-delay: 0.1s; } .delay-2 { animation-delay: 0.3s; } .delay-3 { animation-delay: 0.5s; }
        #custom-cursor { width: 8px; height: 8px; background-color: #fff; border-radius: 50%; position: fixed; transform: translate(-50%, -50%); pointer-events: none; z-index: 9999; transition: width 0.3s, height 0.3s, background-color 0.3s; }
        #custom-cursor-ring { width: 30px; height: 30px; border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%; position: fixed; transform: translate(-50%, -50%); pointer-events: none; z-index: 9998; transition: transform 0.1s ease-out, width 0.3s, height 0.3s, border-color 0.3s; }
        @media (max-width: 1024px) { body { cursor: auto; } #custom-cursor, #custom-cursor-ring { display: none; } }
        .back-nav { max-width: 1200px; margin: 30px auto 0 auto; padding: 0 20px; }
        .back-link { color: #666; text-decoration: none; font-size: 0.9rem; letter-spacing: 1px; transition: color 0.3s; }
        .back-link:hover { color: #fff; }
        .exhibit-container { max-width: 1200px; margin: 40px auto; padding: 0 20px; display: grid; grid-template-columns: 1.2fr 1fr; gap: 50px; }
        @media (max-width: 768px) { .exhibit-container { grid-template-columns: 1fr; gap: 30px; } }
        .media-section { display: flex; flex-direction: column; gap: 20px; }
        .main-image-frame { background: #0d0d0d; border: 1px solid #1c1c1c; padding: 15px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); aspect-ratio: 4/3; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        .main-image-frame img { width: 100%; height: 100%; object-fit: cover; transition: transform 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .main-image-frame:hover img { transform: scale(1.05); }
        .thumbnails { display: flex; gap: 15px; }
        .thumbnail { flex: 1; aspect-ratio: 4/3; background: #0d0d0d; border: 1px solid #1c1c1c; padding: 5px; cursor: pointer; overflow: hidden; transition: border-color 0.3s, transform 0.3s; }
        .thumbnail:hover { border-color: #555; transform: translateY(-2px); }
        .thumbnail.active { border-color: #fff; }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .info-section { display: flex; flex-direction: column; justify-content: flex-start; }
        .info-section h1 { font-size: 2rem; text-transform: uppercase; letter-spacing: 5px; margin: 0 0 10px 0; font-weight: 300; }
        .tags { font-size: 0.85rem; color: #555; margin-bottom: 30px; border-bottom: 1px solid #1c1c1c; padding-bottom: 15px; }
        .tags span { margin-right: 15px; }
        .description { font-size: 0.95rem; line-height: 1.8; color: #aaa; margin-bottom: 40px; }
        .status-box { background: #0d0d0d; border: 1px dashed #222; padding: 25px; margin-top: auto; }
        .status-label { font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .status-value { font-size: 1.2rem; letter-spacing: 1px; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .pulse-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 var(--pulse-color); }
            70% { transform: scale(1); box-shadow: 0 0 0 8px rgba(0, 0, 0, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(0, 0, 0, 0); }
        }
        .contact-link { display: inline-block; color: #fff; text-decoration: none; border-bottom: 1px solid #fff; padding-bottom: 3px; font-size: 0.9rem; letter-spacing: 1px; transition: color 0.3s, border-color 0.3s; }
        .contact-link:hover { color: #888; border-color: #888; }
    </style>
</head>
<body>

    <div id="custom-cursor"></div>
    <div id="custom-cursor-ring"></div>

    <nav class="back-nav animate-fade delay-1">
        <a href="index.html" class="back-link hover-target">← Вернуться в галерею</a>
    </nav>

    <main class="exhibit-container">
        <section class="media-section animate-fade delay-2">
            <div class="main-image-frame">
                <img id="main-view" src="" alt="Главный вид">
            </div>
            <div class="thumbnails" id="thumbnails-container"></div>
        </section>

        <section class="info-section animate-fade delay-3">
            <h1 id="exhibit-title">Название работы</h1>
            
            <div class="tags">
                <span id="exhibit-material">Материал</span>
                <span id="exhibit-size">Размер</span>
                <span id="exhibit-year">Год</span>
            </div>

            <div class="description" id="exhibit-desc">
                </div>

            <div class="status-box">
                <div class="status-label">Статус экспоната</div>
                <div class="status-value" id="exhibit-status-val">
                    <span class="pulse-dot" id="exhibit-pulse"></span> 
                    <span id="exhibit-status-text">Статус</span>
                </div>
                <p style="font-size: 0.85rem; color: #666; margin: 0 0 20px 0; line-height: 1.5;">
                    Если вас интересует приобретение этой работы или у вас возникли вопросы, свяжитесь напрямую.
                </p>
                <a href="https://t.me/твой_логин" target="_blank" class="contact-link hover-target">
                    Уточнить детали / Связаться
                </a>
            </div>
        </section>
    </main>

    <script src="js/cursor.js"></script>
    <script src="js/exhibit.js"></script>
       
    
</body>
</html>
